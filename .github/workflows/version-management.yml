name: Version Check and Update

on:
  pull_request:
    paths:
      - "apps/desktop/package.json"
      - "apps/desktop/src-tauri/Cargo.toml"
      - "apps/desktop/src-tauri/tauri.conf.json"
      - "scripts/version_manager.py"
      - "Makefile"
      - ".github/workflows/version-management.yml"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/package.json"
      - "apps/desktop/src-tauri/Cargo.toml"
      - "apps/desktop/src-tauri/tauri.conf.json"
      - "scripts/version_manager.py"
      - "Makefile"
      - ".github/workflows/version-management.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Target version to sync, e.g. 0.1.1"
        required: true
        type: string
      ref:
        description: "Branch to update (optional, defaults to current ref)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  check:
    name: Version consistency check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check versions
        run: python3 scripts/version_manager.py check

  update:
    name: Sync version files
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Sync versions
        run: |
          python3 scripts/version_manager.py sync --version "${{ inputs.version }}"
          python3 scripts/version_manager.py check

      - name: Commit and push if changed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps/desktop/package.json apps/desktop/src-tauri/Cargo.toml apps/desktop/src-tauri/tauri.conf.json
          git commit -m "chore: sync version to ${{ inputs.version }}"
          git push

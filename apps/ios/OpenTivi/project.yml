name: OpenTivi
options:
  bundleIdPrefix: com.opentivi
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

targets:
  OpenTivi:
    type: application
    platform: iOS
    sources:
      - OpenTivi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.opentivi.ios
        INFOPLIST_FILE: OpenTivi/Info.plist
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
